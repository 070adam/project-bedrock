---
# ALB Ingress — exposes the retail-store ui service via an internet-facing
# Application Load Balancer managed by the AWS Load Balancer Controller.
#
# Apply after the ALB controller and retail-store Helm release are running:
#   kubectl apply -f k8s/ingress/retail-ui-ingress.yaml
#
# Check ALB hostname:
#   kubectl get ingress retail-ui-ingress -n retail-app

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retail-ui-ingress
  namespace: retail-app
  labels:
    project: karatu-2025-capstone
    app: retail-store-ui
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/tags: "Project=karatu-2025-capstone"
    alb.ingress.kubernetes.io/load-balancer-attributes: "idle_timeout.timeout_seconds=60"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
service:
                name: ui
                port:
                  number: 80