name: "Terraform Plan (PR)"

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  id-token: write       # Required for OIDC
  contents: read
  pull-requests: write  # Required to post plan as PR comment

env:
  TF_VERSION: "1.9.5"
  AWS_REGION: "us-east-1"
  WORKING_DIR: "./terraform"

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Configure AWS credentials via OIDC ───────────────────────
      # Preferred: no static credentials stored in GitHub secrets.
      # Set up: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_providers_create_oidc.html
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Fallback: if OIDC is not configured, remove above and uncomment:
          # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # ── Install Terraform ─────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Terraform Init ────────────────────────────────────────────
      - name: Terraform Init
        id: init
        run: terraform init -input=false

      # ── Terraform Validate ────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── Terraform Plan ────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="student_id=${{ secrets.STUDENT_ID }}" \
            -no-color \
            -out=tfplan \
            2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── Post Plan as PR Comment ───────────────────────────────────
      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 65000
              ? planOutput.substring(0, 65000) + '\n\n... [truncated — see Actions log for full output]'
              : planOutput;

            const output = `## 🏗️ Terraform Plan — Project Bedrock
            
            | Step | Result |
            |---|---|
            | 🔧 Init | \`${{ steps.init.outcome }}\` |
            | ✅ Validate | \`${{ steps.validate.outcome }}\` |
            | 📋 Plan | \`${{ steps.plan.outcome }}\` |

            <details><summary>📄 Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            > Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\`
            > Commit: \`${{ github.sha }}\``;

            // Delete previous bot comments to avoid clutter
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.user.type === 'Bot' && comment.body.includes('Terraform Plan — Project Bedrock')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: output,
            });

      # ── Fail if plan errored ──────────────────────────────────────
      - name: Check Plan Exit Code
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "❌ Terraform plan failed. Review errors above."
          exit 1
